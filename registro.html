<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS - Registro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="auth-card">
            <img src="logo.png" alt="ATLAS Logo" class="logo">
            <h2>Crear Cuenta</h2>
            <form>
                <div class="input-group">
                    <label for="name">Nombre Completo</label>
                    <input type="text" id="name" placeholder="Tu nombre" required>
                </div>
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="estudiante@bogota.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Crea una contraseña" required>
                </div>
                <button type="submit" class="btn-primary">Registrarse</button>
            </form>
            <p class="switch-auth">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
        </div>
    </div>
</body>
</html>
